[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100
 
[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
 
#For all Eddy (USB/Duo/Coil)
[probe_eddy_ng btt_eddy]
sensor_type: ldc1612
#sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -16 # These offsets are for this mount https://www.printables.com/model/1115090-eddy-duo-mount-v2
y_offset: 11.5
tap_adjust_z: -0.059 #-0.055           #-0.075 for stock buildplate
tap_target_z: -0.350
tap_mode: butter
tap_samples: 5
tap_samples_stddev: 0.050
