[bed_mesh]
speed: 300 #500
horizontal_move_z: 3
mesh_min: 25,25 # These min/max points are with the above linked Eddy mount on the stock toolhead.
mesh_max: 330, 330
probe_count: 10,10 # 11,11 25,25 # Set to a lower 15,15 default as it appears a too high probe_count (too dense mesh) is bad with rapid_scan, see: https://www.klipper3d.org/Bed_Mesh.html#rapid-continuous-scanning
algorithm: bicubic
bicubic_tension: 0.4 #0.35 0.5
split_delta_z: 0.01 #0.0125  see: https://www.klipper3d.org/Bed_Mesh.html#move-splitting
mesh_pps: 3,3 #4,4
adaptive_margin: 5
fade_start: 0 #1
fade_end: 10
fade_target: 0
scan_overshoot: 5  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.
 
